system:
  description: >
    Pixel 9 Pro / Pro XL (Tensor G4) APatch/KernelSU 模块.
    核心功能: 温控阈值偏移 / CPU调度 (sched_pixel+cpuset) / ZRAM lz77eh 硬件加速 /
    待机功耗优化 / NR 息屏降级 / NTP 时间同步.
    WebUI 控制台运行在 busybox httpd (127.0.0.1:6210), 仅本机 WebView 可访问.
  port: 6210 (loopback only)
  version: v4.3.26 / versionCode=60
  supported_devices:
    - caiman (Pixel 9 Pro)
    - komodo (Pixel 9 Pro XL)
  webui_layer: Material 3 Expressive (深色+浅色+跟随系统)
  git_tags_released:
    - v3.3.1  # 2026-04-17, 有 GitHub release + zip
    - v4.0.3  # 2026-04-17, 源码已 push
    - v4.1.0  # 2026-04-18, Pro XL 双机型 + 温控锁修复
    - v4.2.0  # 2026-04-18, 后端温度历史 + 功耗统计
    - v4.3.0  # 2026-04-19, Doze 友好重构 + UECap 三档手动 + 温度突发录制
    - v4.3.21 # 2026-04-26, 温控基线回归proto + kernel suspend worker + NR降级修复
    - v4.3.24 # 2026-04-27, ODPM 硬件功耗计量 + batterystats 蜂窝估算标注
  tech_stack:
    runtime: busybox httpd + sh CGI (per-request fork, 单线程)
    frontend: 纯 HTML/CSS/JS, 无框架, CSP script-src 'self' (禁止 inline)
    webview: APatch WebView (Chrome-based), 仅 127.0.0.1:6210
    shell: /system/bin/sh (mksh), awk 为 busybox awk 或 toybox awk
  state_files:
    - .current_profile     # 当前 CPU 调度模式 (responsive/balanced/battery/default)
    - .thermal_offset      # 当前温控偏移 (v4.1.0 由 customize.sh 写入, 但 set_thermal.sh 直接读 JSON)
    - .swap_mode           # ZRAM/VM 参数模式 (optimized/stock)
    - .webui_token         # 32字符 hex, 每次启动生成
    - .thermal_cache.json  # 热区实时温度 JSON, 5s 刷新
    - .thermal_history     # 温度历史 CSV (epoch_sec,millideg), 12h 滚动
    - .nr_screen_switch    # NR 息屏降级开关 (on/off)
    - .nr_saved_mode       # 保存的 NR 网络模式值 (如 33)
    - .ntp_server          # 用户选择的 NTP 服务器域名
    - .device_variant      # 机型标记 (caiman/komodo)
    - .locks/              # 互斥锁目录 (mkdir 原子操作)
    - .thermal_burst_until # 温度突发录制截止 epoch (thermal_burst.sh 写入, 后台循环读取)
    - .uecap_policy        # 固定为 "manual" (v4.3.0+ 不再有 auto 策略)
    - .sim2_auto_manage    # SIM2 空槽管理开关 (on/off, v4.3.16+)
    - .idle_isolate_mode   # 待机隔离模式开关 (on/off, v4.3.17+)
    - .standby_diag_state  # 后台 worker 诊断摘要 (v4.3.17+)
    - .power_profile       # 功耗档位 (balanced/battery, v4.3.25+)
    - .bg_restrict_enabled # 后台应用限制总开关 (on/off, v4.3.26+)
    - .bg_restrict_list    # 后台限制包名列表, 每行一个 (v4.3.26+)
  key_paths:
    moddir_on_device: /data/adb/modules/pixel9pro_control
    repo_root: E:\Pixel ADB\pixel9pro_control_v2
    repo_webroot: webroot/
    repo_cgi: webroot/cgi-bin/
    project_docs: E:\Pixel ADB\docs  # 不在仓库里, 根级统管
    bugreports: E:\bugreports
    build_zip_out: E:\Pixel ADB\pixel9pro_control_v2\dist\
    battery_analysis_log: E:\Pixel ADB\battery_analysis_records.yaml
  battery_analysis_notice: |
    历史“电池 / 待机 / 功耗 / Battery 相关分析记录”已迁移到 E:\Pixel ADB\battery_analysis_records.yaml。
    自 2026-04-18 起，以后所有这类分析统一写入该文件；
    当前仓库内 .ai_changelog.yaml 仅保留模块实现、代码变更、构建与非电池类诊断摘要。

architecture:
  module_lifecycle:
    install_time: |
      customize.sh: 检测机型(caiman/komodo) → 选择对应温控stock配置 → 拷贝到 system/vendor/etc/ →
      应用已保存的温控偏移量 → 写入 .device_variant
    boot_time: |
      service.sh: 等待 sys.boot_completed → 生成 webui token → 应用待机设置 →
      ZRAM lz77eh 配置 → VM 参数 → 恢复 NTP → 恢复 CPU profile →
      启动后台循环 (multicast/NR降级/热区缓存+历史) → 启动 httpd →
      120s 后延迟复写待机设置 (防系统回弹)
    runtime: |
      busybox httpd per-request fork CGI. 前端轮询: CPU 3s / thermal 8s / swap 30s / optimize+info 60s.
      用户操作触发 POST → CGI 执行 → 返回 JSON.

  cgi_endpoints:
    read_only:  # GET, 无副作用, 参与轮询
      - thermal.sh          # 实时温度 (优先读缓存) / ?history=1 历史数据
      - status.sh           # 3 个 CPU 集群频率+governor+sched_pixel 参数
      - info.sh             # 设备型号/Android版本/模块版本/httpd RSS/webui token
      - profile.sh (GET)    # 当前 CPU 调度模式
      - swap.sh (GET)       # ZRAM 算法/大小/VM 参数/压缩统计
      - optimize.sh         # 系统设置状态 (8项开关)
      - nr_switch.sh (GET)  # NR 降级开关状态+当前网络模式
      - ntp.sh (GET)        # 当前 NTP 服务器+设备时间
    on_demand:  # GET, 耗时操作, 仅用户点击触发
      - energy.sh           # dumpsys batterystats 解析 (2-3s), 功耗分项+Top10应用
      - thermal_burst.sh (GET)  # 温度突发录制状态查询
      - standby_guard.sh (GET)  # SIM2 / 待机隔离 / worker 诊断状态查询
    write:      # POST, 需 token + JSON Content-Type
      - profile.sh (POST)   # 切换 CPU 调度模式
      - set_thermal.sh (POST)  # 切换温控偏移档位
      - swap.sh (POST)      # 切换 ZRAM/VM 参数模式
      - nr_switch.sh (POST) # 切换 NR 息屏降级
      - ntp.sh (POST)       # 切换 NTP 服务器 / 强制同步
      - reboot.sh (POST)    # 设备重启
      - thermal_burst.sh (POST) # 触发 5 分钟温度突发录制 (5s 间隔)
      - standby_guard.sh (POST) # SIM2 空槽管理 / 待机隔离模式开关切换
    infrastructure:  # 不直接作为 CGI 调用
      - _common.sh          # 安全基础设施 (loopback/token/lock/JSON helpers)
      - _thermal_cache.sh   # build_thermal_json() 函数库

  frontend_state_model: |
    state 对象包含: currentTab / currentProfile / currentOffset / swapMode / themeMode /
    webuiToken / 各种 busy/loading 标志 / cpuRows / homeCpuRows / sensorRefs / timers /
    lastClusters / pull (下拉刷新) / thermalModal.
    无温度历史缓存 (v4.2.0 移除, 改为后端驱动).

  frontend_polling:
    cpu: 3s (refreshCpu)
    thermal: 8s (refreshThermal)
    swap: 30s (refreshSwap)
    slow: 60s (refreshUecap + refreshBaseband + loadInfo)
    energy: 不轮询, 用户点击触发 (2-3s 阻塞)
    nrSwitch: 仅在 init 和全局刷新时获取 (不参与 slow 轮询)

  security_model: |
    1. httpd 绑定 127.0.0.1 (require_loopback 校验 REMOTE_ADDR)
    2. 写操作 CGI 要求 Content-Type: application/json (触发 CORS preflight, 阻止 CSRF)
    3. X-PIXEL9PRO-TOKEN 头认证 (token 从 info.sh 获取, 每次开机随机生成)
    4. 互斥锁 (mkdir 原子 + PID stale 检测) 防止并发写入
    5. CSP: script-src 'self'; frame-ancestors 'none'; form-action 限定

  backend_loops:
    - name: 统一后台工作循环 (v4.3.0 Doze 友好)
      description: |
        v4.3.0 将原 4 个独立后台循环合并为 1 个统一工作循环子 shell.
        每周期仅调用 1 次 dumpsys display 判断屏幕状态, 其余功能在同一循环内按需执行.
      interval: |
        亮屏 15s / 息屏首次 60s (NR 防抖) / 息屏后续 600s / 温度突发 5s
      functions:
        - WiFi multicast: 仅在屏幕状态变化时切换 (不再轮询)
        - NR 息屏降级: 集成防抖, 仅在开启时生效
        - 温度缓存+历史: 每周期记录 VIRTUAL-SKIN 到 CSV
        - 温度突发录制: 检查 .thermal_burst_until, 激活时 5s 间隔
      truncation: 每 360 次检查, 保留 8640 行 (12h)
      doze_impact: 息屏 dumpsys 调用从 ~10次/min 降至 ~0.1次/min
    - name: delayed settings re-apply
      delay: 120s after boot
      function: 重新写入待机设置+NTP, 防 Android 组件回弹

  thinking_directions:
    shell_variable_limits: |
      Android 的 /system/bin/sh (mksh) 和 busybox sh 对变量大小没有硬限制,
      但 printf 作为外部命令 (/system/bin/printf) 受 ARG_MAX 约束.
      dumpsys batterystats 输出 4MB+ → printf '%s\n' "$var" 必然失败.
      解决方向: 管道流式处理, 临时文件中转, awk getline 读文件.
      不要试图用 shell 变量存大量文本.

    thermal_history_design: |
      核心约束: busybox 环境, 无 SQLite/Redis, 最小依赖.
      CSV 追加 + awk 过滤是最简方案. 考虑过 JSON Lines 但 awk 解析 JSON 不可靠.
      截断策略: 不要每次写入都 wc -l (I/O 开销), 改为计数器每 N 次检查一次.
      CGI 端 cutoff 过滤: 用 epoch 秒比较, 避免日期解析.

    frontend_backend_boundary: |
      原则: 需要跨页面刷新存活的数据必须在后端. 前端只负责渲染.
      温度历史是典型案例 — 用户期望打开图表就能看到过去 6 小时的数据,
      而不是"请等 10 分钟让页面积攒数据". 前端 localStorage 不可靠 (WebView 清理).

    uid_resolution: |
      dumpsys batterystats 的 UID 格式: u0aXXX → 10000+XXX.
      pm list packages -U 输出: "package:com.example uid:10315".
      系统进程 UID: 0=root, 1000=system, 1001=radio, 1061=incidentd(待确认).
      解析顺序: 先建 UID→包名映射表, 再逐行匹配.

    busybox_httpd_cgi_context: |
      busybox httpd 以 root 启动, CGI 继承 root 权限.
      环境变量通过 service.sh export 传入 (PIXEL9PRO_MODDIR 等).
      QUERY_STRING 由 httpd 从 URL 解析并设置.
      CGI stdout 第一段是 HTTP headers (空行分隔), 之后是 body.
      busybox httpd 不支持静态文件自定义 Cache-Control 头 (B09 根因).

    apatch_su_syntax: |
      APatch su 与 Magisk su 语法略有不同:
      - su -c 'command' 可用 (单引号包裹)
      - 多行命令需要写成脚本文件再 sh 执行, 或用 echo '...' | su 管道
      - su -c 后面多命令用分号不稳定, 建议用脚本

    thermal_dual_throttle_mechanism: |
      Tensor G4 的 Thermal HAL 对 CPU 有两套独立限频路径:
      1. thermal-cpufreq-N: 硬频率上限 (写入 scaling_max_freq 的 user_vote).
         基于 VIRTUAL-SKIN 传感器阈值级别, 从预定义的 CdevCeilingFrequency 表查找对应频率.
         大核表: [3105000, 2294000, 1885000, 1396000, 1396000, 1396000, 1396000]
      2. thermal-uclamp-N: uclamp 软限制, 由 PID 功率控制器动态调节.
         基于 VIRTUAL-SKIN-CPU-HIGH 传感器, PID 参数: K_Po=400, K_Pu=400, MaxAllocPower=3500mW.
         当 SoC 功耗超过 MaxAllocPower 时, PID 渐进降低 uclamp 值.
         大核表: [3105000, 1557000, 1164000, 700000, 700000, 700000, 700000]
      两者同时生效, 实际频率上限 = min(cpufreq_ceiling, uclamp_ceiling).
      uclamp 更灵敏因为 PID 反馈周期仅 7000ms (PassiveDelay), 且功率权重 0.342 使大核首先被降频.

      温控配置中的 Profile 机制 (game/camera) 可以 Disable 特定冷却设备,
      但必须由 Android PowerHAL 的 PowerSessionManager 通过 setProfile("game") 激活.
      模块写 sched_pixel 参数属于调度层, 无法触发 Thermal HAL 的 Profile 切换.

      实测数据 (2026-04-18): game 模式 response 8/8/8ms → BIG 核心 91°C, VIRTUAL-SKIN 40.6°C,
      大核被 uclamp-7 压到 ~1164MHz. 改为 8/8/12ms 后大核升频速度降低, 功率包络更平滑.

    cpu_benchmark_methodology: |
      CPU 调度模式验证应使用标准化 benchmark 而非 OTA/日常使用:
      - Geekbench 6: 单核/多核分数可量化不同模式的性能差异
      - 3DMark Wild Life Extreme: GPU+CPU 混合负载, 接近游戏场景
      - Antutu CPU: 长时间持续负载, 观察 thermal throttle 介入时机
      不推荐: OTA (I/O 密集非 CPU 密集), 日常使用 (负载随机不可复现)

      关键观测指标:
      - Big 核心实际频率 vs 时间曲线 (cat scaling_cur_freq 每秒采样)
      - VIRTUAL-SKIN 温度 vs 时间曲线 (从 .thermal_history 读取)
      - thermal-uclamp-7 cur_state (0=未限制, >0=PID 在限制)
      - thermal-cpufreq-2 cur_state (0=未限制, >0=硬限频)

    hot_push_vs_reboot: |
      CGI 修改: 立即生效 (per-request fork)
      CSS/JS/HTML: 需清缓存或加 ?v= 参数
      service.sh: 仅下次重启生效 (后台循环已在运行)
      customize.sh: 仅下次模块安装生效
      温控配置 (thermal_info_config.json): 需重启 thermal HAL 或重启手机
      如果需要临时启动新的后台循环, 可以 nohup sh script.sh &

bugs:
  - id: B08
    title: 禁用温控模块导致 thermal-service 启动失败, 卡开机二屏
    root_cause: |
      两个模块同名 id (pixel9pro_control) 同时存在 → backup (v3.3.0) 和主模块 (v4.0.0) 都提供
      system/vendor/etc/thermal_info_config.json (md5 一致). 在 APatch UI 禁用 backup → 重启时
      该模块的 magic mount 被卸载 → 但 v4 也未 mount (APatch 见 disable flag 后顺序问题), 最终
      /vendor/etc/thermal_info_config.json 短时间没有 overlay, 系统回到原厂版本 → Android 17 Beta 3
      的 thermal HAL 启动时对 mount 变化敏感, 服务无法拉起 → "Tried to start aidl service
      android.hardware.thermal.IThermal/default as a lazy service, but was unable to".
    locate_tip: /data/adb/ap/log/dmesg.log.old.log 尾部 grep "thermal|lazy service"
    fix_history:
      - date: 2026-04-17
        note: |
          已记录, 未修复根源 (Android 17 Beta 3 的 HAL bug). 规避方法: 安装 v4 前不要
          禁用 backup; 先装 v4 (thermal_info_config.json md5 相同, mount 平滑切换), 再让 APatch 同时
          清理 backup 和激活 v4.
    related_bugs: [B06]

  - id: B09
    title: Chrome Beta 对本地 http:// 资源缓存过于激进, 热更 webroot 不生效
    root_cause: |
      busybox httpd 默认不发 Cache-Control 响应头 + Chrome 使用 Last-Modified 启发式缓存 +
      index.html 的 <meta http-equiv="Cache-Control"> 是软提示被 Chrome 多数情况忽略.
      结果: 开发者 adb cp 覆盖了新 HTML/CSS, 但 Chrome 下次请求仍返回缓存版本.
    locate_tip: |
      在页面顶栏加版本标记 (如 kicker 追加 "UI vX.Y.Z"); 如果看不到新版本号就是缓存.
      verify: adb shell su -c "md5sum /data/adb/modules/pixel9pro_control/webroot/index.html"
    fix_history:
      - date: 2026-04-17
        note: |
          绕过方案 - 访问 http://127.0.0.1:6210/?r=<随机> 让 URL 不同避开缓存, 或
          Chrome 设置→网站设置→127.0.0.1→清除站点数据. 永久修复需引 CGI 中转以发 Cache-Control 头
          (暂未做, busybox httpd 不支持静态文件自定义头).

  - id: B10
    title: 性能页/温控页档位卡右侧圆形详情按钮横向位置不一致
    root_cause: |
      问题根因不是“按钮和文字长度绑定”，而是卡片 flex 布局缺了一步:
      中间文案容器 .profile-copy 仍是默认 flex: 0 1 auto，没有占满卡片剩余宽度。
      结果右侧 .profile-actions 不是固定贴右，而只是跟在文案后方。
      性能页模式描述更长，看起来按钮更靠右；温控页描述更短，按钮就紧贴文字后面，
      因而形成两个页面布局不一致的现象。
    locate_tip: |
      同时打开“性能”页和“温控”页观察档位卡。
      如果右侧圆形详情按钮与卡片右侧边距不恒定，而是随文案长短变化，就是这个问题。
      代码检查点: webroot/app.css 中 .profile-copy / .profile-actions 的 flex 行为。
    fix_history:
      - date: 2026-04-17
        note: |
          已修复。为 .profile-copy 增加 flex:1 1 auto 让文本区吃满剩余空间,
          为 .profile-actions 增加 margin-left:auto 把按钮组固定推到卡片最右侧.
          用户已在手机端实机确认性能页与温控页显示一致.

  - id: B11
    title: 温控档位首次点击失败, 第二次才成功
    root_cause: |
      busybox httpd 在超时或客户端断连时 kill CGI 子进程, shell 的 EXIT trap 来不及执行,
      导致 .locks/thermal.lock/ 目录残留 (stale lock). 下一次 POST acquire_lock 时 mkdir 失败,
      返回 409 Conflict → 前端显示"切换失败". 手动重试时如果时机好 (busybox 回收了进程),
      同样的 stale lock 仍然存在, 但因为某些情况下 CGI 在 EXIT 前就输出了响应导致行为不一致.
    locate_tip: |
      检查 /data/adb/modules/pixel9pro_control/.locks/ 是否存在 thermal.lock 目录.
      如果里面没有 pid 文件或 pid 对应进程已死, 就是 stale lock.
    fix_history:
      - date: 2026-04-18
        note: |
          acquire_lock 增加 stale lock 检测: 在锁目录内写入 PID 文件, 获取锁失败时检查
          持有者 PID 是否仍存活 (kill -0), 若已死则自动清除并重新获取.
          release_lock 同步清理 pid 文���后再 rmdir.

  - id: B12
    title: 游戏模式全核 response 8ms 导致大核被 uclamp 激进降频到 1120MHz
    root_cause: |
      cpu_profile.sh 游戏模式将三个集群的 response_time_ms 全设为 8ms, 导致:
      1. 小核+中核+大核同时以最快速度冲到最高频 → SoC 瞬时功耗极高
      2. BIG 核心温度飙到 91°C (即使 VIRTUAL-SKIN 机身皮温只有 40.6°C)
      3. Thermal HAL 有两套独立的限频机制同时作用于大核:
         a) VIRTUAL-SKIN 传感器 → thermal-cpufreq-2 (freq ceiling): 3105→2294→1885→1396 MHz
         b) VIRTUAL-SKIN-CPU-HIGH 传感器 → thermal-uclamp-7 (uclamp ceiling): 3105→1557→1164→700 MHz
      4. uclamp 的 PID 控制器更激进: MaxAllocPower=3500mW, 超限后 PID 反馈快速压制频率
      5. 即使有散热背夹, SoC 内核(非皮肤)温度仍会飙高, 因为散热无法对抗 Tensor G4 的瞬时功率密度

      关键认知:
      - thermal-cpufreq-N 是硬频率上限 (scaling_max_freq), 基于阈值级别对应固定频率表
      - thermal-uclamp-7 是 uclamp 软限制, 由 PID 功率控制器动态调节, 更灵敏更激进
      - 两者同时存在, 取较低值生效
      - thermal_info_config.json 中有 "game" Profile 会 Disable 这两个冷却设备,
        但需要 Android PowerHAL (PowerSessionManager) 激活, 模块的 cpu_profile.sh 无法触发

      温控配置实测数据 (VIRTUAL-SKIN-CPU-HIGH, 已含+4°C偏移):
        HotThreshold: [NAN, 45.0, 48.0, NAN, NAN, NAN, NAN]
        uclamp-7 CdevCeilingFrequency: [3105000, 1557000, 1164000, 700000, ...]
        → 45°C 时大核被 uclamp 限到 1557MHz, 48°C 时限到 1164MHz (≈用户观察到的 1120MHz)
    locate_tip: |
      dumpsys thermalservice → 看 "BIG" mValue (SoC核心温度) 和 "VIRTUAL-SKIN" mValue
      如果 BIG > 85°C 而 VIRTUAL-SKIN < 43°C, 说明是 PID 功率控制在降频而非阈值限频.
      查 "Current cooling devices from HAL" → thermal-uclamp-7 的 cur_state,
      非 0 即表示 uclamp 正在限制大核.
    fix_history:
      - date: 2026-04-18
        note: |
          1. 游戏模式大核 response_time 从 8ms 改为 12ms, 降低大核冲频速度,
             给 PID 控制器更多调节空间, 避免功率瞬间超限触发 uclamp 深度降频.
          2. 新增温度门控: VIRTUAL-SKIN >= 41°C (41000 millideg) 时拒绝切换到游戏模式,
             profile.sh CGI 返回 ok:false + 温度提示, 前端显示 toast.
          3. cpu_profile.sh 新增 get_skin_temp() 函数: 优先读 .thermal_cache.json 缓存,
             回退到 dumpsys thermalservice 实时查询.
    related_bugs: []

  - id: B13
    title: CPU 调度模式缺乏压力测试验证
    root_cause: |
      所有 5 种调度模式 (game/balanced/light/battery/stock) 的 response_time_ms 参数值
      均基于理论分析和经验估计, 未经过系统性的 CPU 压力测试验证.
      B12 (游戏模式降频) 暴露了这个问题: 仅凭 response_time_ms 数值无法预测
      Thermal HAL 的 PID 功率控制器的实际行为.
    locate_tip: |
      测试方法:
      - 基础验证: 切换模式后 cat sched_pixel/response_time_ms 确认参数写入
      - CPU 压力: 使用 Geekbench 6 (单核+多核), 3DMark Wild Life Extreme, 或直接用
        stress-ng (若有), 观察 Big 核心是否持续维持目标频率
      - 温度观察: 跑 benchmark 期间每 5s 记录 VIRTUAL-SKIN + BIG 核心温度,
        确认温度-频率的映射关系与预期一致
      - 不推荐用 OTA 测试 — OTA 涉及 I/O + 解压 + 校验, 负载模式不典型,
        且 SoC 温度和 I/O 等待交替导致频率抖动, 不能反映纯 CPU 性能
    fix_history:
      - date: 2026-04-18
        note: |
          已记录, 后续需逐模式进行 benchmark 验证. 优先级: game > balanced > light.
          game 模式已从 8/8/8ms 改为 8/8/12ms 并增加温度门控, 但仍需实际游戏测试
          (如原神/Wuthering Waves 30分钟) 验证 uclamp-7 介入频次和幅度.

  - id: B14
    title: KernelSU 兼容性 — service.sh 执行时机不对, WebUI httpd 启动失败
    root_cause: |
      service.sh 依赖 late_start hook, 在 APatch 中约系统启动后 8s 执行且保证权限充足.
      KernelSU v0.5.x-v0.7.x 的 late_start 执行时机和上下文与 APatch 不同:
      - KSU v0.5.x: 延迟不足, 系统组件可能尚未完全初始化
      - KSU v0.6.x: 执行时机迁移, 导致 module 路径权限不一致
      - KSU v0.7.x+: SELinux context 更严格, busybox httpd fork 可能被拦截
      结果: httpd 进程启动失败 (Permission Denied 或 execve blocked) → WebUI 无法访问.
    locate_tip: |
      adb logcat -d | grep -E "pixel9pro_ctrl|httpd|Permission|SELinux"
      重点搜索:
      - "httpd: fork failed" 或 "execve blocked by SELinux"
      - "No such file or directory" (PATH 差异)
      - service.sh 日志中 "Waiting for sys.boot_completed" 超时
      adb shell ls -la /data/adb/modules/pixel9pro_control/webroot/ (检查权限)
      adb shell netstat -tuln | grep 6210 (检查端口是否监听)
    status: open
    priority: 🔴 critical
    affected_versions: [v4.2.0, v4.2.1]
    affected_root_methods: [KernelSU]
    fix_strategy: |
      1. 在 service.sh 顶部添加 detect_root_method() 函数, 识别 APatch/KSU/Magisk
      2. 为 KSU 增加额外延迟: 等待 sys.boot_completed=1 后再等 +30s (确保 SELinux context)
      3. 修复权限: chmod 0755 MODDIR + chmod 0666 状态文件
      4. 简化 httpd 启动: 用 /system/bin/toybox 备选方案

  - id: B15
    title: KernelSU SELinux 权限限制 — 温控/CPU设置无法写入
    root_cause: |
      APatch 的 SuperKey 在 kernel 层伪造了 uid=0 + gid=0, 对 SELinux context 无限制.
      KernelSU 的 kernel hook 执行的脚本运行在 KSU 专有的 SELinux domain, 可能缺少:
      - 对 /proc/sys/kernel/sched_pixel/* 的写权限
      - 对 /sys/module/thermal_drv/parameters/ 的访问权限
      - 对 /data/system/settings/ (content provider) 的权限
      结果: 温控偏移、CPU 模式切换、NTP 设置均失败 (Operation not permitted / Permission denied).
    locate_tmp: |
      adb shell sh /data/adb/modules/pixel9pro_control/webroot/cgi-bin/profile.sh GET
      期望: {"current_profile":"balanced", ...}
      实际 (KSU): {"error":"Permission denied", "code":13}

      adb shell cat /proc/cmdline | grep "androidboot.selinux" (检查 SELinux 模式)
      getenforce (应该显示 Enforcing 或 Permissive)
      adb logcat -d | grep -i selinux (检查 SELinux denials)
    status: open
    priority: 🔴 critical
    affected_versions: [v4.2.0, v4.2.1]
    affected_ksu_versions: [v0.6.0+]
    fix_strategy: |
      1. CGI 脚本检查权限: 若 write 失败, 记录到 logcat 而非静默失败
      2. 为 KSU 新增权限修复: 在 service.sh 中显式 chmod/chown 关键文件
      3. 使用 getenforce/setenforce 检测 SELinux 模式, 若 Enforcing 则更换策略
      4. 考虑使用 KSU 提供的 pm grant 机制 (如可用)

  - id: B16
    title: KernelSU 后台进程被定期清理 — 热区缓存循环中断
    root_cause: |
      service.sh 启动的后台循环进程 (thermal-cache 更新、multicast 控制、NR 降级) 在 KSU 中
      可能被 kernel scheduler 或 KSU daemon 定期清理. 这可能与:
      - KSU 的进程管理策略 (app freezing / low-memory killer 集成)
      - module 卸载检测 (如果 module 被禁用)
      - battery saver / doze mode 的自适应清理
      导致后台循环意外退出 → 热区缓存不更新 → WebUI 显示过期数据 / NR 降级失效.
    locate_tip: |
      ps -A 查看后台进程是否还存在
      adb logcat -d | grep "pixel9pro\|thermal-cache\|multicast" (检查日志是否中断)
      如果后台循环启动后 5min 内未见新日志, 说明进程被清理了
      检查 /data/adb/modules/pixel9pro_control/.stop_backend 是否被意外创建
    status: open
    priority: 🟡 high
    affected_versions: [v4.2.0, v4.2.1]
    affected_ksu_versions: [v0.7.0+] (推测)
    fix_strategy: |
      1. 后台循环增加守护进程: 若子进程意外退出, 由 watch dog 脚本重启
      2. 使用 cron / timer 代替无限循环 (如果 KSU 支持)
      3. 将关键逻辑迁移到 kernel space (KPModule) 或 init hook
      4. 增加心跳文件: 每次循环更新 .thermal_cache.json 的 mtime, 前端轮询检查 mtime 是否在更新

  - id: B17
    title: KernelSU content provider 权限限制 — settings 命令无权限
    root_cause: |
      service.sh 中调用 settings put global ntp_server / mobile_data_always_on 等需要 content provider 权限.
      APatch 可直接执行, KernelSU 可能因 SELinux 或 uid 处理差异被拦截:
      - uid 可能不是真正的 uid=0, 而是 KSU 虚拟 uid
      - content provider 权限检查更严格
      结果: 大多数 "settings put" 命令失败 (Permission denied) → NTP/待机设置无法保存.
    locate_tip: |
      adb shell settings put global test_key test_value 2>&1
      如果输出 "Error" 或 "Permission denied", 说明 settings 命令被限制了
      adb shell id (检查真实 uid, 应该是 0)
      adb logcat -d | grep "settings\|content_provider" (检查权限拒绝)
    status: open
    priority: 🟡 high
    affected_versions: [v4.2.0, v4.2.1]
    affected_ksu_versions: [v0.6.0+]
    fix_strategy: |
      1. detect_root_method() 检测到 KSU 后, 跳过 settings 调用或用条件分支
      2. 对关键设置 (ntp_server) 保存本地副本, 开机时尝试恢复 (不依赖 settings)
      3. 研究 KSU 的 pm grant / AppOpsManager 机制, 看是否能提权 content provider
      4. 后备方案: 使用 sqlite3 直接修改 /data/data/com.android.providers.settings/databases/settings.db

ksu_compatibility_summary: |
  当前 v4.2.1 **主要针对 APatch 优化**, KSU 兼容性存在 4 个 blocking issues (B14-B17).
  初步修复可在 v4.2.2 中实现 (添加条件执行 + 延迟 + 权限修复),
  但需要 KSU 用户的具体诊断日志来验证方案有效性.

  建议流程:
  1. [立即] 招募 KSU 用户收集诊断日志 (见下方 log_collection_guide)
  2. [第1周] 分析日志, 确认是 B14/B15/B16/B17 中的哪个(或多个)
  3. [第2周] 实现 v4.2.2 修复版本, 加入条件执行代码
  4. [第3周] KSU 用户验证修复, 收集反馈
  5. [第4周] 发布 v4.2.2 + 更新文档标注 KSU 初步支持

agent_handoff:
  critical_rules:
    - 绝不同时存在两个同 id 模块. 如果有 backup 副本 (非 APatch 正规装的), 改名目录或彻底卸载
      前务必先装替代模块, 让两个模块提供的 system overlay 相同 (md5 一致) 再过渡.
    - 改动 webroot 后不要盲信 adb md5 匹配就等于用户看到新内容. 必须让用户验证 UI 版本标记,
      确认 Chrome 没吃缓存.
    - 连续重启 / 连续 apd module install 有 thermal-service 崩溃风险 (B06/B08 家族), 间隔 >30s.
  safe_bug_fix_protocol:
    - 修改 webroot/cgi-bin/*.sh 必须保留: require_loopback / require_token / require_json_post / acquire_lock
    - 所有 CGI 必须 source _common.sh, 热区逻辑走 _thermal_cache.sh
    - 前端 CSP 保持 script-src 'self' (无 unsafe-inline)
    - 写操作 CGI 用 Content-Type application/json 触发 CORS preflight
    - 前端所有写操作 API 带 X-PIXEL9PRO-TOKEN 头 (从 info.sh 的 webui_token 字段读取)
    - 修改 CSS/JS 时更新 index.html 里的 ?v=X.Y.Z 查询参数, 并在 kicker 显示 "UI vX.Y.Z" 标记
  release_protocol:
    - 推送前必须先在本地保存 README.md 和 dist/release_vX.Y.Z.md
    - 确认本地文件内容正确后再 git add → commit → push → tag → gh release create
    - release notes 文件保留在 dist/ 目录, .gitignore 排除 *.zip 但保留 *.md
    - README.md 版本号、module.prop 版本号、index.html kicker 版本号必须三者一致
    - 操作顺序: 1)写 README+release notes 2)review 3)commit 4)push 5)tag 6)gh release create --notes-file
  hot_push_protocol:
    - 所有文件先 adb push 到 /sdcard/Download/, 再 su -c cp 到模块目录
    - CGI 脚本必须 chmod 755, 否则 busybox httpd 返回 500
    - MSYS_NO_PATHCONV=1 必须在 Git Bash 环境下加在 adb 命令前
    - 热推送后不需要重启 httpd — busybox httpd per-request fork
    - 温控配置变更后需 stop/start vendor.thermal-hal-2-0 或重启
  pitfalls:
    - 不要写 /sys/.../cpufreq/scaling_max_freq/min_freq (被 Thermal HAL freq_qos 覆盖)
    - foreground cpuset 系统框架层强制覆盖 0-6, 不可对抗
    - ZRAM 算法出厂 persist 属性是 lz4, 模块设为 lz77eh (Emerald Hill 硬件加速)
    - 前端玻璃态/悬浮导航已经废弃, 新设计规范见 E:\Pixel ADB\docs\HTML-移动端设计规范.md
    - 不要在模块仓库内放 docs/, 文档统一放根级 E:\Pixel ADB\docs\
    - .gitignore 已排除 dist/*.zip (.ai_changelog.yaml 作为项目状态追踪进仓库跟踪)
    - flex 布局按钮对齐 (B10 教训) - 行内右侧控件想恒定贴右, 中间文案区必须显式 flex:1 1 auto,
      右侧容器加 margin-left:auto. 不要依赖"文本自然占满", 短文本会让右侧控件跟着漂移.
    - 游戏模式不能盲目设 response_time=8ms 全核冲频 (B12 教训). Thermal HAL 有两套独立限频:
      thermal-cpufreq-N (硬上限) 和 thermal-uclamp-N (PID 软限制). uclamp 的 PID 更激进,
      大核功率超 3500mW 就会被快速压到 1164/700MHz. 大核 response_time 需 >= 12ms.
    - 温控配置中 "game" Profile 的 Disabled:true 需要 PowerHAL 激活, 模块的 sched_pixel 写入无法触发.
    - 不要用 OTA 测试 CPU 性能 — OTA 涉及 I/O+解压+校验, 负载模式不典型. 用 Geekbench 或 3DMark.
    - cpu_profile.sh 的第二个参数 $2 是 MODDIR, CGI 和 service.sh 调用时都需要传入.
    - v4.3.0 UECap 改为纯手动三档, .uecap_policy 固定为 manual. 不要再启动 uecap_policy.sh 后台循环.
    - v4.3.0 后台只有 1 个统一工作循环 (不再有 4 个独立循环). 修改 service.sh 后台逻辑时注意子 shell 变量作用域.
    - thermal_burst.sh CGI 写 .thermal_burst_until 文件, 后台循环读取. 两者通过文件通信, 无锁竞争.
    - 息屏 600s 长休眠是 Doze 友好的关键, 不要在息屏路径增加短间隔 dumpsys 调用.

