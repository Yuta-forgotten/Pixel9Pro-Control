hot_push:
  description: |
    adb 热推送流程: 无需重新打包 zip, 直接替换设备上的文件即可生效.
    适用场景: CGI修复/前端修改/温控配置变更/新增文件.
    限制: customize.sh 变更只在下次刷入时生效, module.prop 变更需重启.
  steps:
    - step: 1. 推送文件到 /sdcard/Download/ (无需 root)
      command: |
        MSYS_NO_PATHCONV=1 adb push "E:/Pixel ADB/pixel9pro_control_v2/webroot/cgi-bin/_common.sh" "/sdcard/Download/_common.sh"
        MSYS_NO_PATHCONV=1 adb push "E:/Pixel ADB/pixel9pro_control_v2/webroot/cgi-bin/set_thermal.sh" "/sdcard/Download/set_thermal.sh"
        MSYS_NO_PATHCONV=1 adb push "E:/Pixel ADB/pixel9pro_control_v2/webroot/index.html" "/sdcard/Download/index.html"
        MSYS_NO_PATHCONV=1 adb push "E:/Pixel ADB/pixel9pro_control_v2/webroot/app.js" "/sdcard/Download/app.js"
        MSYS_NO_PATHCONV=1 adb push "E:/Pixel ADB/pixel9pro_control_v2/webroot/app.css" "/sdcard/Download/app.css"
    - step: 2. su cp 到模块目录 + 设权限
      command: |
        MSYS_NO_PATHCONV=1 adb shell "su -c 'MODDIR=/data/adb/modules/pixel9pro_control; \
          cp /sdcard/Download/_common.sh \$MODDIR/webroot/cgi-bin/_common.sh; \
          cp /sdcard/Download/set_thermal.sh \$MODDIR/webroot/cgi-bin/set_thermal.sh; \
          cp /sdcard/Download/index.html \$MODDIR/webroot/index.html; \
          cp /sdcard/Download/app.js \$MODDIR/webroot/app.js; \
          cp /sdcard/Download/app.css \$MODDIR/webroot/app.css; \
          chmod 755 \$MODDIR/webroot/cgi-bin/*.sh; \
          echo OK'"
    - step: 3. 清理残留锁 (可选, 若之前有 409 错误)
      command: |
        MSYS_NO_PATHCONV=1 adb shell "su -c 'rm -rf /data/adb/modules/pixel9pro_control/.locks/thermal.lock'"
    - step: 4. 验证
      command: |
        MSYS_NO_PATHCONV=1 adb shell "su -c 'md5sum /data/adb/modules/pixel9pro_control/webroot/cgi-bin/_common.sh'"
  notes:
    - CGI (.sh) 修改后立即生效, busybox httpd 每次请求 fork 新进程
    - HTML/CSS/JS 修改后需在 Chrome 清缓存或访问 ?r=随机数 (B09)
    - thermal_stock*.json / thermal_info_config.json 替换后需重启 thermal service 或重启手机
    - service.sh 修改只在下次重启时生效
    - customize.sh 修改只在下次模块安装时生效
    - MSYS_NO_PATHCONV=1 是 Git Bash on Windows 的路径修正, 缺少会导致 /sdcard 被篡改为 D:\Git\sdcard
    - APatch su 语法: su -c 'command' (单引号包裹完整命令)

debugging_tips:
  - 'WebUI 打不开: logcat "pixel9pro_ctrl", 确认 httpd 绑 127.0.0.1:6210 且有 WebUI(loopback) 日志'
  - 'httpd 绑错目录: ps 看绑定路径. 如果是 backup 模块的 webroot → 装主模块时 backup 还在抢端口'
  - '温度显示 --: 查 $MODDIR/.thermal_cache.json 是否 5s 刷新一次'
  - '档位卡右侧按钮忽左忽右: 查 webroot/app.css 里 .profile-copy 是否 flex:1, .profile-actions 是否 margin-left:auto'
  - '403 loopback only: CGI 被非 127.0.0.1 访问, 检查 Chrome host 是否 127.0.0.1:6210 (不要用 localhost)'
  - '403 invalid token: info.sh 的 webui_token 没写入 state.webuiToken, 通常是 info 请求失败'
  - '深色模式不触发: Chrome Beta 对本地 http:// 的 prefers-color-scheme 支持不稳定, 建议手动选深色'
  - 'UI 改动不生效: 99% 是 Chrome 缓存 (B09). 验证方式: kicker 的 "UI vX.Y.Z" 标记'
  - '卡二屏: 首看 /data/adb/ap/log/dmesg.log.old.log 里 "thermal" 关键字 (B08 家族)'
  - '温度历史为空: 检查 .thermal_history 文件是否存在且在增长 (wc -l). 若无则后台写入循环可能未启动, 需重启'
  - '温度历史 CGI 返回空 points: 确认 minutes 参数合理, 确认 date +%s 在设备上输出正确的 epoch'
  - '功耗统计全为 0: dumpsys batterystats 输出过大导致 shell 变量溢出. v4.2.0 已改为管道+临时文件方案, 若仍为 0 检查 /data/local/tmp/.energy_* 残留'
  - 'energy.sh Argument list too long: 使用了旧版 energy.sh (变量存储全量 batterystats). 确认已部署 v4.2.0 版本'
  - '游戏模式大核降频到 1120MHz: 是 thermal-uclamp-7 的 PID 功率控制在起作用, 不是 thermal-cpufreq-2. 查 dumpsys thermalservice → BIG mValue (SoC核温) 和 thermal-uclamp-7 cur_state'
  - '游戏模式切换被拒: VIRTUAL-SKIN >= 41°C 温度门控触发. 等冷却到 41°C 以下再切换. 查 .thermal_cache.json 里的 VIRTUAL-SKIN temp 值'
  - 'CPU 调度测试方法: 用 Geekbench 6 / 3DMark, 不要用 OTA. OTA 是 I/O 密集型, 不能反映 CPU 纯计算性能'
  - '后台循环是否运行: ps -A | grep "sh.*service.sh" (v4.3.0 只有 1 个子 shell). 如果不存在说明开机后未启动或被杀'
  - '温度突发录制: cat .thermal_burst_until → epoch > 当前时间说明突发进行中. 正常息屏后应自动过期'
  - 'UECap 三档切换: cat .uecap_manual_mode → special/balanced/universal. 如果 policy 不是 manual 说明文件被篡改'
  - 'Doze 验证: dumpsys deviceidle → 如果能进入 IDLE 状态说明后台循环没阻止深度休眠'

design_decisions:
  temperature_history:
    problem: |
      前端 JS 内存存储温度历史, 页面刷新即丢失. 10分钟/30分钟图表范围对纯前端方案无意义.
      用户明确反馈: "刷新丢数据的方案没有意义".
    considered_approaches:
      - name: 前端 localStorage
        rejected_reason: 容量有限, 跨 WebView 实例不可靠, 仍无法解决首次打开无数据问题
      - name: 后端 SQLite
        rejected_reason: busybox httpd CGI 环境无 sqlite3, 安装额外二进制增加模块复杂度
      - name: 后端 CSV 追加文件
        chosen: true
        reason: |
          service.sh 已有 5s 热区缓存循环, 只需追加一行 CSV. 格式极简 (epoch,millideg),
          busybox awk 即可过滤和输出 JSON. 无额外依赖, 文件大小可控 (12h ≈ 200KB).
    implementation_notes: |
      - sed 从 build_thermal_json 的 JSON 输出提取 VIRTUAL-SKIN 温度值
      - 每 360 次采样 (~30分钟) 检查文件行数并截断, 保留最近 8640 条
      - CGI 端用 awk 的 cutoff 过滤, 避免传输全量数据
      - 前端 drawTempCanvas 的时间轴改用 epoch 秒 (后端格式), 不再用 Date.now() 毫秒

  energy_stats:
    problem: |
      用户希望看到高耗电应用和功耗分布. dumpsys batterystats 输出可达数 MB,
      不能存入 shell 变量 (printf "Argument list too long").
    considered_approaches:
      - name: shell 变量存储全量 batterystats
        rejected_reason: |
          实测在设备上 dumpsys batterystats 输出 4MB+, printf '%s\n' "$var" 导致
          /system/bin/printf: Argument list too long. 根本原因是 Android sh 的 printf
          外部命令有参数长度限制.
      - name: 管道 + awk 预过滤 + 临时文件
        chosen: true
        reason: |
          dumpsys 输出直接管道到 awk, 仅提取 EST:/UID:/BAT:/SOFF:/SON: 前缀的行到临时文件.
          第二遍 awk 读取精简后的临时文件 (~200行) + 包名文件, 完成 UID 解析和 JSON 输出.
          全程不存大变量, 兼容 busybox sh 环境.
    implementation_notes: |
      - UID 格式: u0aXXX → 10000+XXX, 直接数字 → 原样
      - pm list packages -U 输出 "package:com.example uid:10315" 格式, awk 建立 UID→包名映射
      - batterystats 的 UID 行已按耗电排序 (sort -t: -k2 -rn), 只取 top 10
      - 系统 UID 回退名: 0→root, 1000→system, 1001→radio

