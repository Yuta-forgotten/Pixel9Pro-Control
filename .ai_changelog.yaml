  # --- 2026-04-26 v4.3.18 Kernel suspend 友好 worker (探屏 IPC-free + NR 切换防抖) ---
  - timestamp: 2026-04-26T00:10:00+08:00
    file_path: service.sh
    action: MODIFY
    description: >
      v4.3.18 worker loop 三处改动,目的是解决 v4.3.17 时点 batterystats 实测数据
      Cellular Sleep=0% / suspend success 64% / userspace-abort 1765 次/8h 的 kernel 不休眠问题.
      (1) 探屏改用 sysfs 直读 /sys/class/drm/card0-DSI-1/dpms (替换 dumpsys display IPC),
      失败时降级到原 dumpsys 路径,保证早期 boot 阶段兼容.
      (2) _NR_DELAY 60s → 300s: 短锁屏(口袋亮灭/查看消息)不再触发 NR↔LTE 切换,
      避免高频 RIL re-init 导致 s5100_wake_lock 被频繁拉起.
      (3) _NR_LTE_POLL 60s → 300s: 切换到 LTE 后 worker 醒来频率降到每 300s 一次,
      把 wakeup 密度从 60/h 降到 12/h,给 kernel 真正的 deep suspend 窗口;
      代价:屏幕重新点亮后 NR 恢复最多滞后 5 分钟(用户体感可接受).
      这三处共同消除模块自身对 Linux kernel suspend 的设计性阻碍.
      期望: failed_suspend 大幅下降, Cellular Sleep > 0%, 待机放电率 <60 mAh/h.
      预期需重启后过夜验证.
  - timestamp: 2026-04-26T00:10:00+08:00
    file_path: customize.sh
    action: MODIFY
    description: >
      ui_print 安装界面版本号 v4.3.17 → v4.3.18, 头部注释同步.
  - timestamp: 2026-04-26T00:10:00+08:00
